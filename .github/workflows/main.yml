name: Crypto-1D-Analysis

on:
  schedule:
    # Her gün TSİ 03:05'te otomatik çalışır
    - cron: '5 0 * * *'
  workflow_dispatch: # Manuel çalıştırma butonu sağlar

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        # Kütüphaneleri kuran kritik kısım burası:
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        # Ana kod dosyanın adının bot.py olduğundan emin ol:
        run: python bot.py
